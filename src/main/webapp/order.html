<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>外卖下单</title>
</head>
<body>
<h2>外卖订单提交</h2>
<form action="order/create" method="post">
    客户姓名：<input type="text" name="customer" required><br>
    菜品名称：<input type="text" name="food" required><br>
    购买数量：<input type="number" name="quantity" min="1" required><br>
    <button type="submit">提交订单</button>
</form>
</body>
</html>
